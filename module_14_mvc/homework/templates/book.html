{% extends "base.html" %}

{% block content %}
<h1>Book information</h1>

<table class="customTable">
    <thead>
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Views</th>
    </tr>
    </thead>
    <tbody>
    <tr>
        <td>{{ book.id }}</td>
        <td>{{ book.title }}</td>
        <td>{{ book.author }}</td>
        <td>{{ book.views }}</td>
    </tr>
    </tbody>
</table>
{% endblock %}
