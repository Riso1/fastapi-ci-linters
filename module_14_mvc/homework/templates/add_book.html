{% extends "base.html" %}

{% block content %}
<div class="form-style-10">
    <h1>Add new book!<span>Fill the fields and and new books to the DB!</span></h1>
    <form action="/books/form" method="post">
        {{ form.hidden_tag() }}
        <div class="section"><span>1</span>Book title</div>
        <div class="inner-wrap">
            <label>Book title {{ form.book_title(required=True) }}</label>
        </div>

        <div class="section"><span>2</span>Author full name</div>
        <div class="inner-wrap">
            <label>Author full name {{ form.author_name(required=True) }}</label>
        </div>

        <div class="button-section">
            <input type="submit" value="Add new book"/>
        </div>
    </form>
</div>
{% endblock %}
