services:
  web:
    build: .
    container_name: flask_app
    command: gunicorn -b 0.0.0.0:5000 run:app
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql+psycopg2://skillbox_user:skillbox_password@db:5432/skillbox_db
    depends_on:
      - db
    networks:
      - app_network

  db:
    image: postgres:16
    container_name: postgres_db
    environment:
      POSTGRES_USER: skillbox_user
      POSTGRES_PASSWORD: skillbox_password
      POSTGRES_DB: skillbox_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_logs:/var/log/postgresql
    command:
      [
        "postgres",
        "-c", "log_destination=stderr",
        "-c", "logging_collector=on",
        "-c", "log_directory=/var/log/postgresql"
      ]
    networks:
      - app_network

volumes:
  postgres_data:
  postgres_logs:

networks:
  app_network:
